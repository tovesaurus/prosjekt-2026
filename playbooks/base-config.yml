# Basekonfigurasjoner alle servere skal ha

- name: Configure basic settings for all servers
  hosts: all
  become: true

# Alle hosts må ha python installert for at Ansible skal kunne utføre playbooks:
  tasks:
  - name: Install python
    ansible.builtin.apt:
      name: Python3
      state: present

