---
- name: Installer samba avhengigheter for AD-integrasjon
  hosts: samba_fileshare
  become: true

  tasks:
    - name: Installer winbind, Kerberos og samba
      ansible.builtin.apt:
        name:
          - samba
          - winbind
          - libnss-winbind
          # unødvendig dersom hjemmemapper ikke skal etablere på filserver:
          - libpam-winbind
          - krb5-user
        state: present
        update_cache: yes