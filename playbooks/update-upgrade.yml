---
- name: Update system
  hosts: all
  become: true

  tasks:
    - name: Update packages on servers
      ansible.builtin.apt: 
        update_cache: yes 
        force_apt_get: yes 
        cache_valid_time: 3600
    
    - name: Upgrade packages on servers
      ansible.builtin.apt: 
        upgrade: yes
        force_apt_get: yes

    - name: Check if reboot is required
      register: reboot_required_file
      stat: path=/run/reboot-required

    - name: Reboot servers if there was a kernel Update
      reboot: 
        msg: "Rebooting servers because kernel was updated"
        connection_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 30
        post_reboot_delay: 30
        test_command: uptime
      when: reboot_required_file.stat.exists